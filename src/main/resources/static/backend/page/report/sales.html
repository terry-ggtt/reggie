<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>统计分析</title>
  <link rel="stylesheet" href="../../plugins/element-ui/index.css" />
  <link rel="stylesheet" href="../../styles/common.css" />
  <link rel="stylesheet" href="../../styles/page.css" />
  <style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f5f7fa; }
  .report-container { padding: 20px; }
  .header { background: #fff; padding: 20px; border-radius: 4px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
  .header h2 { font-size: 18px; color: #303133; }
  .search-box { display: flex; gap: 15px; align-items: center; }
  .stat-row { display: flex; gap: 20px; margin-bottom: 20px; }
  .stat-card { flex: 1; background: #fff; padding: 20px; border-radius: 4px; text-align: center; }
  .stat-card .num { font-size: 28px; font-weight: bold; color: #409eff; margin: 10px 0 5px; }
  .stat-card .label { font-size: 14px; color: #909399; }
  .chart-row { display: flex; gap: 20px; margin-bottom: 20px; }
  .chart-card { flex: 1; background: #fff; padding: 20px; border-radius: 4px; }
  .chart-title { font-size: 16px; color: #303133; margin-bottom: 15px; font-weight: 500; }
  .chart-inner { height: 300px; }
  </style>
</head>
<body>
  <div id="app">
    <div class="report-container">
      <!-- 搜索栏 -->
      <div class="header">
        <h2>数据统计分析</h2>
        <div class="search-box">
          <el-radio-group v-model="dateType" size="small" @change="onTypeChange">
            <el-radio-button label="day">按日</el-radio-button>
            <el-radio-button label="month">按月</el-radio-button>
            <el-radio-button label="year">按年</el-radio-button>
          </el-radio-group>
          <el-date-picker v-model="dateRange" type="daterange" placeholder="选择日期" range-separator="至" start-placeholder="开始" end-placeholder="结束" value-format="yyyy-MM-dd" size="small"></el-date-picker>
          <el-button type="primary" size="small" @click="loadData">查询</el-button>
        </div>
      </div>

      <!-- 统计卡片 -->
      <div class="stat-row">
        <div class="stat-card">
          <div class="label">总订单量</div>
          <div class="num">{{ totalOrders }}</div>
        </div>
        <div class="stat-card">
          <div class="label">总销售额</div>
          <div class="num">¥{{ totalAmount }}</div>
        </div>
      </div>

      <!-- 图表区域 -->
      <div class="chart-row">
        <div class="chart-card" style="flex: 2;">
          <div class="chart-title">销售趋势</div>
          <div id="salesChart" class="chart-inner"></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">分类占比</div>
          <div id="categoryChart" class="chart-inner"></div>
        </div>
      </div>

      <div class="chart-row">
        <div class="chart-card">
          <div class="chart-title">热销菜品 TOP10</div>
          <div id="dishChart" class="chart-inner"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="../../plugins/vue/vue.js"></script>
  <script src="../../plugins/element-ui/index.js"></script>
  <script src="../../plugins/axios/axios.min.js"></script>
  <script src="../../js/request.js"></script>
  <script src="../../plugins/echarts/echarts.min.js"></script>

  <script>
    new Vue({
      el: '#app',
      data: function() {
        return {
          dateType: 'day',
          dateRange: [],
          totalOrders: 0,
          totalAmount: '0.00',
          salesChart: null,
          dishChart: null,
          categoryChart: null
        };
      },
      mounted: function() {
        this.initDate();
        this.initCharts();
        this.loadData();
      },
      methods: {
        initDate: function() {
          var end = new Date();
          var start = new Date();
          start.setTime(start.getTime() - 3600 * 1000 * 24 * 7);
          this.dateRange = [start, end];
        },
        initCharts: function() {
          var self = this;
          try {
            this.salesChart = echarts.init(document.getElementById('salesChart'));
            this.dishChart = echarts.init(document.getElementById('dishChart'));
            this.categoryChart = echarts.init(document.getElementById('categoryChart'));
            window.onresize = function() {
              self.salesChart && self.salesChart.resize();
              self.dishChart && self.dishChart.resize();
              self.categoryChart && self.categoryChart.resize();
            };
          } catch(e) {
            console.error('Chart init error:', e);
          }
        },
        onTypeChange: function() {
          this.initDate();
        },
        loadData: function() {
          var self = this;
          if (!this.dateRange || this.dateRange.length < 2) {
            this.$message.warning('请选择日期');
            return;
          }
          var begin = this.formatDate(this.dateRange[0]);
          var end = this.formatDate(this.dateRange[1]);

          // 销售趋势
          $axios({ url: '/report/sales/date', method: 'get', params: { begin: begin, end: end } })
            .then(function(res) {
              if (res.code === 1 && res.data) {
                self.renderSalesChart(res.data);
                var total = res.data.reduce(function(sum, item) { return sum + (item.orderCount || 0); }, 0);
                self.totalOrders = total;
                var amount = res.data.reduce(function(sum, item) { return sum + parseFloat(item.totalAmount || 0); }, 0);
                self.totalAmount = amount.toFixed(2);
              }
            });

          // 热销菜品
          $axios({ url: '/report/dish/top10', method: 'get', params: { begin: begin, end: end, limit: 10 } })
            .then(function(res) {
              if (res.code === 1 && res.data) {
                self.renderDishChart(res.data);
              }
            });

          // 分类占比
          $axios({ url: '/report/category/sales', method: 'get', params: { begin: begin, end: end } })
            .then(function(res) {
              if (res.code === 1 && res.data) {
                self.renderCategoryChart(res.data);
              }
            });
        },
        formatDate: function(date) {
          if (date instanceof Date) {
            var y = date.getFullYear();
            var m = ('0' + (date.getMonth() + 1)).slice(-2);
            var d = ('0' + date.getDate()).slice(-2);
            return y + '-' + m + '-' + d;
          }
          return date;
        },
        renderSalesChart: function(data) {
          if (!data || data.length === 0) {
            this.salesChart.setOption({ title: { text: '暂无数据', left: 'center', top: 'center' } });
            return;
          }
          var xData = data.map(function(item) { return item.date; });
          var orderData = data.map(function(item) { return item.orderCount || 0; });
          var amountData = data.map(function(item) { return parseFloat(item.totalAmount) || 0; });

          this.salesChart.setOption({
            tooltip: { trigger: 'axis' },
            legend: { data: ['订单量', '销售额'], bottom: 0 },
            grid: { left: '3%', right: '4%', bottom: '15%', containLabel: true },
            xAxis: { type: 'category', data: xData, boundaryGap: false },
            yAxis: [
              { type: 'value', name: '订单量' },
              { type: 'value', name: '销售额', position: 'right', axisLabel: { formatter: '¥{value}' } }
            ],
            series: [
              { name: '订单量', type: 'bar', data: orderData, itemStyle: { color: '#409eff' } },
              { name: '销售额', type: 'line', yAxisIndex: 1, data: amountData, itemStyle: { color: '#67c23a' }, smooth: true }
            ]
          });
        },
        renderDishChart: function(data) {
          if (!data || data.length === 0) {
            this.dishChart.setOption({ title: { text: '暂无数据', left: 'center', top: 'center' } });
            return;
          }
          var names = data.map(function(item) { return item.name; });
          var sales = data.map(function(item) { return item.sales || 0; });

          this.dishChart.setOption({
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            grid: { left: '3%', right: '15%', bottom: '3%', containLabel: true },
            xAxis: { type: 'value' },
            yAxis: { type: 'category', data: names.reverse(), inverse: true },
            series: [{
              type: 'bar',
              data: sales.reverse(),
              itemStyle: { color: '#e6a23c' },
              label: { show: true, position: 'right' }
            }]
          });
        },
        renderCategoryChart: function(data) {
          if (!data || data.length === 0) {
            this.categoryChart.setOption({ title: { text: '暂无数据', left: 'center', top: 'center' } });
            return;
          }
          var chartData = data.map(function(item) {
            return { name: item.categoryName, value: parseFloat(item.amount) || 0 };
          });

          this.categoryChart.setOption({
            tooltip: { trigger: 'item', formatter: '{b}: ¥{c} ({d}%)' },
            legend: { orient: 'vertical', left: 'left', top: 'center' },
            series: [{
              type: 'pie',
              radius: ['40%', '70%'],
              center: ['60%', '50%'],
              data: chartData,
              emphasis: { itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0, 0, 0, 0.5)' } }
            }]
          });
        }
      }
    });
  </script>
</body>
</html>
