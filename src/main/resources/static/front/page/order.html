<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0,user-scalable=no,minimal-ui">
    <title>我的订单</title>
    <link rel="icon" href="./../images/favico.ico">
    <script src="./../js/base.js"></script>
    <link rel="stylesheet" href="../../backend/plugins/element-ui/index.css" />
    <link rel="stylesheet" href="../styles/index.css" />
    <link rel="stylesheet" href="../styles/vant.min.css"/>
    <link rel="stylesheet" href="./../styles/order.css" />
    <style>
      .order-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 12px;
      }
      .order-actions .btnAgain {
        min-width: 72px;
        text-align: center;
      }
      .order-actions .btnDisabled {
        color: #999999;
        background: #f5f5f5;
      }
      .review-item-option {
        display: flex;
        justify-content: space-between;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="order" class="app">
      <div class="divHead">
        <div class="divTitle">
          <i class="el-icon-arrow-left" @click="goBack"></i>我的订单
        </div>
      </div>

      <div class="divBody" v-if="orderList.length > 0">
        <van-list
          v-model="loading"
          :finished="finished"
          finished-text="没有更多了"
          @load="getList">
          <van-cell v-for="(order,index) in orderList" :key="index" class="item">
            <div class="timeStatus">
              <span>{{order.orderTime}}</span>
              <span>{{getStatus(order.status)}}</span>
            </div>
            <div class="dishList">
              <div v-for="(item,itemIndex) in order.orderDetails" :key="itemIndex" class="item">
                <span>{{item.name}}</span>
                <span>x{{item.number}}</span>
              </div>
            </div>
            <div class="result">
              <span>共{{order.sumNum}}件商品，实付</span><span class="price">￥{{order.amount}}</span>
            </div>
            <div class="btn order-actions">
              <div class="btnAgain" @click="addOrderAgain(order)">再来一单</div>
              <div class="btnAgain" :class="{ btnDisabled: order.status !== 4 }" @click="openReview(order)">评价商品</div>
              <div class="btnAgain" :class="{ btnDisabled: order.status !== 4 }" @click="openAfterSale(order)">申请售后</div>
            </div>
          </van-cell>
        </van-list>
      </div>

      <div class="divNoData" v-else>
        <div class="divContainer">
          <img src="./../images/no_order.png"/>
          <div>暂无订单</div>
        </div>
      </div>

      <el-dialog title="评价菜品/套餐" :visible.sync="reviewDialog" width="90%">
        <el-form label-width="82px">
          <el-form-item label="评价商品">
            <el-select v-model="reviewForm.orderDetailId" placeholder="请选择菜品或套餐" style="width: 100%;">
              <el-option
                v-for="item in reviewItems"
                :key="item.id"
                :label="item.name"
                :value="item.id">
                <span class="review-item-option">
                  <span>{{ item.name }}</span>
                  <span>x{{ item.number }}</span>
                </span>
              </el-option>
            </el-select>
          </el-form-item>
          <el-form-item label="评分">
            <el-rate v-model="reviewForm.rating"></el-rate>
          </el-form-item>
          <el-form-item label="评价内容">
            <el-input type="textarea" :rows="4" v-model="reviewForm.content" maxlength="1000" show-word-limit></el-input>
          </el-form-item>
          <el-form-item label="匿名">
            <el-switch v-model="reviewAnonymous"></el-switch>
          </el-form-item>
        </el-form>
        <span slot="footer">
          <el-button @click="reviewDialog = false">取消</el-button>
          <el-button type="primary" @click="submitReview">提交评价</el-button>
        </span>
      </el-dialog>

      <el-dialog title="申请售后" :visible.sync="afterSaleDialog" width="90%">
        <el-form label-width="82px">
          <el-form-item label="售后类型">
            <el-select v-model="afterSaleForm.type" style="width: 100%;">
              <el-option label="退款" :value="1"></el-option>
              <el-option label="补偿" :value="2"></el-option>
            </el-select>
          </el-form-item>
          <el-form-item label="申请原因">
            <el-input v-model="afterSaleForm.reason" maxlength="200"></el-input>
          </el-form-item>
          <el-form-item label="申请金额">
            <el-input-number v-model="afterSaleForm.applyAmount" :min="0" :precision="2" style="width: 100%;"></el-input-number>
          </el-form-item>
          <el-form-item label="问题描述">
            <el-input type="textarea" :rows="4" v-model="afterSaleForm.description" maxlength="1000" show-word-limit></el-input>
          </el-form-item>
        </el-form>
        <span slot="footer">
          <el-button @click="afterSaleDialog = false">取消</el-button>
          <el-button type="primary" @click="submitAfterSale">提交申请</el-button>
        </span>
      </el-dialog>
    </div>

    <script src="../../backend/plugins/vue/vue.js"></script>
    <script src="../../backend/plugins/element-ui/index.js"></script>
    <script src="./../js/vant.min.js"></script>
    <script src="../../backend/plugins/axios/axios.min.js"></script>
    <script src="./../js/request.js"></script>
    <script src="./../api/order.js"></script>
    <script src="./../api/review.js"></script>
    <script>
      new Vue({
        el:"#order",
        data(){
          return {
            paging:{
              page:1,
              pageSize:5
            },
            orderList:[],
            loading:false,
            finished:false,
            reviewDialog:false,
            afterSaleDialog:false,
            reviewForm:{},
            reviewItems:[],
            reviewAnonymous:false,
            afterSaleForm:{}
          }
        },
        created(){
          this.initData()
        },
        methods:{
          goBack(){
            const url = document.referrer
            if(url.includes('success')){
              window.requestAnimationFrame(()=>{
                window.location.href= '/front/index.html'
              })
            }else{
              history.go(-1)
            }
          },
          initData(){
            this.getList()
          },
          async getList(){
            if(this.finished){
              this.loading = false
              return
            }
            const res = await orderPagingApi(this.paging)
            if(res.code === 1){
              const records = res.data.records || []
              records.forEach(item=>{
                let number = 0
                ;(item.orderDetails || []).forEach(ele=>{
                  number += ele.number || 0
                })
                item.sumNum = number
              })
              this.orderList.push(...records)
              this.loading = false
              if(this.paging.page >= res.data.pages){
                this.finished = true
              }
              this.paging.page = this.paging.page + 1
            }else{
              this.$notify({ type:'warning', message:res.msg})
            }
          },
          async addOrderAgain(order){
            const res = await orderAgainApi({id:order.id})
            if(res.code === 1){
              window.requestAnimationFrame(()=>{
                window.location.href= '/front/index.html'
              })
            }else{
              this.$notify({ type:'warning', message:res.msg})
            }
          },
          openReview(order){
            if(order.status !== 4){
              this.$notify({ type:'warning', message:'订单完成后才能评价商品'})
              return
            }
            this.reviewItems = order.orderDetails || []
            this.reviewAnonymous = false
            this.reviewForm = {
              orderId: order.id,
              orderDetailId: this.reviewItems.length ? this.reviewItems[0].id : null,
              rating: 5,
              content: '',
              isAnonymous: 0
            }
            this.reviewDialog = true
          },
          async submitReview(){
            if(!this.reviewForm.orderDetailId){
              this.$notify({ type:'warning', message:'请选择要评价的菜品或套餐'})
              return
            }
            this.reviewForm.isAnonymous = this.reviewAnonymous ? 1 : 0
            const res = await addReviewApi(this.reviewForm)
            if(res.code === 1){
              this.reviewDialog = false
              this.$notify({ type:'success', message:'评价已提交'})
            }else{
              this.$notify({ type:'warning', message:res.msg})
            }
          },
          openAfterSale(order){
            if(order.status !== 4){
              this.$notify({ type:'warning', message:'订单完成后才能申请售后'})
              return
            }
            this.afterSaleForm = { orderId: order.id, type: 1, reason: '', description: '', applyAmount: order.amount || 0 }
            this.afterSaleDialog = true
          },
          async submitAfterSale(){
            if(!this.afterSaleForm.reason){
              this.$notify({ type:'warning', message:'请输入申请原因'})
              return
            }
            const res = await addAfterSaleApi(this.afterSaleForm)
            if(res.code === 1){
              this.afterSaleDialog = false
              this.$notify({ type:'success', message:'售后申请已提交'})
            }else{
              this.$notify({ type:'warning', message:res.msg})
            }
          },
          getStatus(status){
            switch(status){
              case 1:
                return '待付款'
              case 2:
                return '正在派送'
              case 3:
                return '已派送'
              case 4:
                return '已完成'
              case 5:
                return '已取消'
              default:
                return ''
            }
          }
        }
      })
    </script>
  </body>
</html>
